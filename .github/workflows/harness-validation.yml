name: Harness Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Harness validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate SDK runner help
        run: node scripts/run-agent-sdk.mjs --help

      - name: Validate SDK runner provider routing dry-run
        run: |
          node scripts/run-agent-sdk.mjs --agent context-explorer --dry-run --prompt "probe"
          node scripts/run-agent-sdk.mjs --agent-sequence context-explorer,code-reviewer --dry-run --prompt "probe"

      - name: Verify harness structure with POSIX shell
        run: sh scripts/verify-harness.sh

      - name: Verify harness structure with PowerShell
        shell: pwsh
        run: pwsh -File scripts/verify-harness.ps1

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate plugin manifest
        run: claude plugin validate plugins/codex-harness
